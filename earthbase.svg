<svg width="160" height="180" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">

  <!-- Earth (circle) -->
  <circle cx="80" cy="60" r="40" fill="#2F855A" />

  <!-- Diagonal line -->
  <line x1="50" y1="85" x2="110" y2="35" stroke="white" stroke-width="3" />

  <!-- Base line -->
  <line x1="45" y1="110" x2="115" y2="110" stroke="#1A202C" stroke-width="4" />

  <!-- Text -->
  <text x="80" y="150"
        text-anchor="middle"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="28"
        fill="#1A202C"
        letter-spacing="-0.5">
    earthbase
  </text>

</svg>